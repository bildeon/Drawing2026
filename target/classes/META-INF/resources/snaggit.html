
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snaggit Light v2</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; }
        #toolbar { width: 180px; background: #eef; padding: 10px; box-sizing: border-box; }
        #canvas-area { flex: 1; position: relative; background: #fff; overflow: hidden; border: 1px solid #ccc; margin: 0 10px; }
        #gallery { width: 180px; background: #f7f7f7; padding: 10px; box-sizing: border-box; overflow-y: auto; }
        .draggable-img {
            position: absolute; cursor: move; max-width: 300px;
            transform-origin: center center;
        }
        .gallery-img {
            width: 100%; margin-bottom: 10px; cursor: grab;
        }
        .selected { outline: 2px dashed red; }
    </style>
</head>
<body>
<div id="toolbar">
    <input type="file" id="uploader" accept="image/*,image/svg+xml"><br><br>
    <button onclick="zoom(1.1)">🔍 Zoom inn</button><br><br>
    <button onclick="zoom(0.9)">🔎 Zoom ut</button><br><br>
    <input type="number" id="rotate-input" placeholder="Vinkel (°)" style="width: 100%;"><br>
    <button onclick="rotate()">🔄 Roter</button><br><br>
    <button onclick="deleteImg()">🗑️ Slett</button><br><br>
    <button onclick="startCrop()">✂️ Klipp</button><br><br>
    <button onclick="exportCanvas()">💾 Eksporter</button><br>
</div>

<div id="canvas-area" ondrop="drop(event)" ondragover="event.preventDefault();"></div>
<div id="gallery"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    let selected = null;
    let cropBox = null;
    let startX = 0, startY = 0;

    document.getElementById('uploader').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            const src = evt.target.result;
            const thumb = document.createElement('img');
            thumb.src = src;
            thumb.className = "gallery-img";
            thumb.setAttribute('draggable', true);
            thumb.addEventListener('dragstart', function(ev) {
                ev.dataTransfer.setData('text/plain', src);
            });
            document.getElementById('gallery').appendChild(thumb);
        };
        reader.readAsDataURL(file);
    });

    function drop(e) {
        e.preventDefault();
        const src = e.dataTransfer.getData('text/plain');
        const img = new Image();
        img.src = src;
        img.className = "draggable-img";
        img.style.left = e.offsetX + "px";
        img.style.top = e.offsetY + "px";
        img.dataset.scale = "1";
        img.dataset.rotation = "0";
        makeInteractive(img);
        document.getElementById('canvas-area').appendChild(img);
    }

    function makeInteractive(img) {
        img.addEventListener('mousedown', e => {
            selected = img;
            document.querySelectorAll('.draggable-img').forEach(el => el.classList.remove("selected"));
            img.classList.add("selected");
            const offsetX = e.offsetX;
            const offsetY = e.offsetY;

            function move(ev) {
                img.style.left = (ev.pageX - offsetX) + "px";
                img.style.top = (ev.pageY - offsetY) + "px";
            }

            function stop() {
                window.removeEventListener('mousemove', move);
                window.removeEventListener('mouseup', stop);
            }

            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
        });
    }

    function zoom(factor) {
        if (!selected) return;
        const current = parseFloat(selected.dataset.scale || "1");
        const next = current * factor;
        selected.dataset.scale = next;
        const angle = selected.dataset.rotation || "0";
        selected.style.transform = `scale(${next}) rotate(${angle}deg)`;
    }

    function rotate() {
        if (!selected) return;
        const angle = parseInt(document.getElementById('rotate-input').value || "0");
        selected.dataset.rotation = angle;
        const scale = selected.dataset.scale || "1";
        selected.style.transform = `scale(${scale}) rotate(${angle}deg)`;
    }

    function deleteImg() {
        if (!selected) return;
        selected.remove();
        selected = null;
    }

    function startCrop() {
        const canvas = document.getElementById('canvas-area');
        cropBox = document.createElement("div");
        cropBox.style.position = "absolute";
        cropBox.style.border = "2px dashed blue";
        canvas.appendChild(cropBox);

        canvas.onmousedown = function(e) {
            startX = e.offsetX;
            startY = e.offsetY;
            cropBox.style.left = startX + "px";
            cropBox.style.top = startY + "px";
            cropBox.style.width = "0px";
            cropBox.style.height = "0px";

            canvas.onmousemove = function(ev) {
                const w = ev.offsetX - startX;
                const h = ev.offsetY - startY;
                cropBox.style.width = w + "px";
                cropBox.style.height = h + "px";
            }

            canvas.onmouseup = function(ev) {
                canvas.onmousemove = null;
                canvas.onmouseup = null;

                if (selected) {
                    const left = parseInt(cropBox.style.left);
                    const top = parseInt(cropBox.style.top);
                    const right = left + parseInt(cropBox.style.width);
                    const bottom = top + parseInt(cropBox.style.height);
                    const canvasWidth = canvas.clientWidth;
                    const canvasHeight = canvas.clientHeight;
                    selected.style.clipPath = `inset(${top}px ${canvasWidth - right}px ${canvasHeight - bottom}px ${left}px)`;
                }

                cropBox.remove();
                cropBox = null;
            }
        }
    }

    function exportCanvas() {
        html2canvas(document.getElementById('canvas-area')).then(canvas => {
            const link = document.createElement('a');
            link.download = 'export.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
